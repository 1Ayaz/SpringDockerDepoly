<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CSE Registration Form</title>
<style>
    .center {
        margin: auto;
        width: 60%;
        border: 3px solid #73AD21;
        padding: 20px;
    }
    label {
        display: inline-block;
        width: 100px;
        margin: 5px 0;
    }
    input[type="text"], input[type="number"] {
        padding: 5px;
        margin: 5px 0;
    }
    input[type="submit"] {
        margin-top: 10px;
        padding: 8px 20px;
        background-color: #73AD21;
        color: white;
        border: none;
        cursor: pointer;
    }
</style>
</head>
<body>
<div class="center">
    <h2>CSE Student Registration</h2>
    <form th:action="@{/register}" th:object="${cseform}" method="post">
        <label>ID:</label>
        <input type="number" th:field="*{id}" /><br/>
        <label>Name:</label>
        <input type="text" th:field="*{name}" /><br/>
        <label>Branch:</label>
        <input type="text" th:field="*{branch}" /><br/>
        <label>College:</label>
        <input type="text" th:field="*{college}" /><br/>
        <label>City:</label>
        <input type="text" th:field="*{city}" /><br/>
        <input type="submit" value="Register" />
    </form>
</div>
</body>
</html>
